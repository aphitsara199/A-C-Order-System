<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard ฝ่ายขาย | A AND C FOODS SHOP</title>
  <link rel="stylesheet" href="../css/A-C-Sales-Dashboard.css">
  <script src="../assets/data/product-catalog.js"></script>
</head><body><header class="top"><div class="brand"><img src="../assets/images/ac-foods-shop-logo.jpg" alt="A AND C"><span>A AND C FOODS SHOP<br><small>ระบบฝ่ายขาย</small></span></div><button id="logout" class="logout">ออกจากระบบ</button></header><main class="shell"><div class="heading"><div><small>SALES ORDER MANAGEMENT</small><h1>รายการใบสั่งซื้อลูกค้า</h1><p>ติดตามใบสั่งซื้อ ลูกค้า และสถานะใบเสนอราคา</p></div><button id="refresh" class="export">↻ โหลดข้อมูลล่าสุด</button></div><section class="stats"><div class="stat"><small>ใบสั่งซื้อทั้งหมด</small><b id="statAll">0</b></div><div class="stat"><small>ยังไม่ทำใบเสนอราคา</small><b id="statPending">0</b></div><div class="stat"><small>ทำใบเสนอราคาแล้ว</small><b id="statDone">0</b></div><div class="stat"><small>ลูกค้าทั้งหมด</small><b id="statCustomers">0</b></div></section><section class="panel"><nav class="tabs"><button class="tab active" data-tab="orders">ใบสั่งซื้อ</button><button class="tab" data-tab="customers">ข้อมูลลูกค้า</button></nav><section id="ordersPanel"><div class="toolbar"><input id="search" placeholder="ค้นหาเลขที่ใบสั่งซื้อ ชื่อลูกค้า หรือเบอร์โทร"><select id="status"><option value="all">ทุกสถานะ</option><option value="pending">ยังไม่ทำใบเสนอราคา</option><option value="completed">ทำใบเสนอราคาแล้ว</option></select><input id="date" type="date"><button id="exportOrders" class="export">Export ใบสั่งซื้อ Excel</button></div><div id="orders" class="content"></div></section><section id="customersPanel" class="customers"><div class="toolbar"><input id="customerSearch" placeholder="ค้นหาชื่อลูกค้า ชื่อผู้ใช้ หรือเบอร์โทร"><button id="exportCustomers" class="export">Export ลูกค้า Excel</button></div><div id="customers" class="content"></div></section></section></main>  <script src="../js/services/api-config.js"></script>
  <script src="../js/services/api-client.js"></script>
  <script src="../js/A-C-Sales-Dashboard.js"></script>
</body></html>
