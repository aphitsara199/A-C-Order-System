</head><body><main class="card"><img class="logo" src="../assets/images/ac-foods-shop-logo.jpg" alt="A AND C FOODS SHOP"><section id="formStage"><h1>รีเซ็ตรหัสผ่านด้วยตัวเอง</h1><p class="intro">ยืนยันชื่อผู้ใช้และเบอร์โทรศัพท์ที่ใช้สมัคร แล้วตั้งรหัสผ่านใหม่ได้ทันที</p><form id="form"><label class="field">ชื่อผู้ใช้<div class="control"><span>@</span><input name="username" required></div></label><label class="field">เบอร์โทรศัพท์ที่ลงทะเบียน<div class="control"><span>⌕</span><input name="phone" required type="tel"></div></label><label class="field">รหัสผ่านใหม่<div class="control"><span>●</span><input id="password" required type="password" minlength="4" maxlength="6" placeholder="4-6 ตัว"><button id="show" type="button">แสดง</button></div></label><label class="field">ยืนยันรหัสผ่านใหม่<div class="control"><span>●</span><input id="confirm" required type="password" minlength="4" maxlength="6" placeholder="กรอกอีกครั้ง"></div></label><p class="error" id="error"></p><button class="primary" type="submit">บันทึกรหัสผ่านใหม่ →</button></form><p class="back"><a href="Pakarang-Customer-Login.html">← กลับหน้าเข้าสู่ระบบ</a></p></section><section class="success" id="success"><i>✓</i><h1>เปลี่ยนรหัสผ่านสำเร็จ</h1><p>ใช้รหัสผ่านใหม่เข้าสู่ระบบได้ทันที</p><a class="primary" href="Pakarang-Customer-Login.html">เข้าสู่ระบบ →</a></section></main>  <script src="../js/services/api-config.js"></script>
  <script src="../js/services/api-client.js"></script>
